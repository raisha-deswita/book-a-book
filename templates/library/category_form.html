{% extends 'base_dashboard.html' %}
{% block content %}
<div class="max-w-2xl mx-auto py-8">
    <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100">
        <div class="bg-slate-900 p-8 text-white">
            <h1 class="text-2xl font-black italic tracking-tighter">{{ action }} Category</h1>
            <p class="text-slate-400 text-xs mt-1">Set rules for books under this category.</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Category Name</label>
                <input type="text" name="name" value="{{ category.name }}" required class="w-full px-5 py-3 rounded-xl border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary font-bold text-slate-700 transition-all">
            </div>

            <div>
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Description (Optional)</label>
                <textarea name="description" rows="3" placeholder="Tulis deskripsi kategori ini..." class="w-full px-5 py-3 rounded-xl border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary font-medium text-slate-600 transition-all resize-none">{{ category.description }}</textarea>
            </div>
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Max Loan (Days)</label>
                    <input type="number" name="loan_duration_days" value="{{ category.loan_duration_days|default:7 }}" required min="1" class="w-full px-5 py-3 rounded-xl border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary font-bold text-slate-700 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Fine Per Day (Rp)</label>
                    <input type="number" name="fine_per_day" value="{{ category.fine_per_day|default:1000 }}" required min="0" class="w-full px-5 py-3 rounded-xl border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-primary/20 focus:border-primary font-bold text-slate-700 transition-all">
                </div>
            </div>

            <div class="flex gap-4 pt-6 border-t border-slate-100">
                <a href="{% url 'library:category_management' %}" class="py-4 px-6 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-black uppercase tracking-widest transition-all text-center">Cancel</a>
                <button type="submit" class="flex-1 py-4 bg-primary hover:bg-blue-600 text-white rounded-xl font-black uppercase tracking-widest shadow-xl shadow-blue-200 transition-all">Save Category</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
