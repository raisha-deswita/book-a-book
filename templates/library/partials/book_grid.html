{% for book in recent_books %}
<div class="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 overflow-hidden hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 group flex flex-col">
    
    <div class="h-72 bg-slate-50 flex items-center justify-center relative overflow-hidden">
        {% if book.cover_image %}
            <img src="{{ book.cover_image.url }}" alt="{{ book.title }}" class="h-full w-full object-cover group-hover:scale-110 transition-transform duration-700">
        {% else %}
            <i class="fa-solid fa-book-journal-whills text-6xl text-slate-200 group-hover:scale-125 transition-transform duration-700"></i>
        {% endif %}
        
        <div class="absolute top-4 right-4 bg-white/95 backdrop-blur-md px-4 py-1.5 rounded-xl shadow-lg border border-white">
            <span class="text-[10px] font-black text-primary uppercase tracking-widest">{{ book.category.name }}</span>
        </div>
    </div>
    
    <div class="p-6 flex flex-col flex-grow">
        <a href="{% url 'library:book_detail' book.id %}">
            <h3 class="font-extrabold text-xl text-slate-800 line-clamp-2 hover:text-primary transition-colors leading-tight mb-2" title="{{ book.title }}">{{ book.title }}</h3>
        </a>
        <p class="text-sm text-slate-500 font-medium"><i class="fa-solid fa-pen-nib mr-2 text-slate-300"></i>{{ book.author }}</p>
        
        <div class="mt-auto flex justify-between items-center border-t border-slate-50 pt-5 mt-5">
            <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-3 py-1.5 rounded-lg uppercase tracking-wider">Terbit: {{ book.publication_year }}</span>
            
            <a href="{% url 'library:book_detail' book.id %}" class="w-10 h-10 bg-slate-50 hover:bg-primary text-slate-400 hover:text-white rounded-xl flex items-center justify-center transition-all group/btn shadow-sm">
                <i class="fa-solid fa-arrow-right-long group-hover/btn:-rotate-45 transition-transform"></i>
            </a>
        </div>
    </div>
</div>
{% empty %}
<div class="col-span-full text-center py-24 bg-white rounded-[3rem] border-2 border-slate-100 border-dashed">
    <div class="mx-auto w-20 h-20 bg-slate-50 rounded-3xl flex items-center justify-center mb-6">
        <i class="fa-solid fa-box-open text-4xl text-slate-300"></i>
    </div>
    <h3 class="text-2xl font-extrabold text-slate-800">Empty Collection</h3>
    <p class="text-slate-500 mt-2 font-medium">No books available for your search.</p>
</div>
{% endfor %}
